<section id="inicio" class="relative min-h-screen flex items-center justify-center overflow-hidden"
    aria-label="Sección principal">
    <!-- Background Video -->
    <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover">
        <source src="assets/videos/hero-video1.mp4" type="video/mp4">
        <source src="assets/videos/hero-video1.mp4" type="video/webm">
    </video>

    <!-- Overlay gradient for better text readability -->
    <div class="absolute inset-0 bg-gradient-to-b from-lm-black/40 via-lm-black/30 to-lm-black/50"></div>

    <!-- Grain overlay -->
    <div class="grain-overlay"></div>

    <!-- Content centered -->
    <div class="relative z-10 flex flex-col items-center justify-center text-center px-6">
        <!-- Tag -->
        <div class="mb-8 animate-fade-in-up">
            <span
                class="inline-flex items-center gap-2 px-4 py-1.5 border border-lm-light text-lm-white text-xs font-body tracking-[0.3em] uppercase">
                <span class="w-2 h-2 bg-lm-white rounded-full animate-pulse"></span>
                Agencia de Marketing Digital
            </span>
        </div>

        <!-- Headline -->
        <h1 class="animate-fade-in-up delay-200 max-w-4xl">
            <span
                class="block font-display text-5xl sm:text-6xl lg:text-7xl xl:text-8xl font-800 leading-[0.95] tracking-[-0.04em] text-lm-white">
                CREAMOS
            </span>
            <span
                class="block font-display text-5xl sm:text-6xl lg:text-7xl xl:text-8xl font-800 leading-[0.95] tracking-[-0.04em] text-gray-100 mt-3">
                MARCAS
            </span>
            <span
                class="block font-display text-5xl sm:text-6xl lg:text-7xl xl:text-8xl font-800 leading-[0.95] tracking-[-0.04em] text-lm-white mt-3">
                QUE<span class="text-lm-graphite ml-4">_</span>
            </span>
            <span
                class="block font-display text-5xl sm:text-6xl lg:text-7xl xl:text-8xl font-800 leading-[0.95] tracking-[-0.04em] mt-3 hero-gradient-text">
                IMPACTAN
            </span>
        </h1>

        <!-- Subtitle -->
        <p class="text-lm-white text-lg lg:text-xl max-w-2xl leading-relaxed animate-fade-in-up delay-400 mt-8">
            Transformamos ideas en<span class="text-lm-accent"> experiencias digitales poderosas</span>. Estrategia,
            creatividad y datos al servicio
            de tu marca.
        </p>

        <!-- CTA Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 animate-fade-in-up delay-500 mt-12">
            <a (click)="scrollTo('contacto')"
                class="inline-flex items-center justify-center gap-3 px-8 py-4 bg-lm-white text-lm-black font-display font-700 text-sm tracking-[0.1em] hover:bg-lm-accent transition-all duration-300 group cursor-pointer">
                INICIAR PROYECTO
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    class="transition-transform group-hover:translate-x-1">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </a>
            <a (click)="scrollTo('portafolio')"
                class="inline-flex items-center justify-center gap-3 px-8 py-4 border border-lm-graphite text-lm-white font-display font-600 text-sm tracking-[0.1em] hover:border-lm-silver hover:bg-lm-charcoal/50 transition-all duration-300 cursor-pointer">
                VER TRABAJOS
            </a>
        </div>
    </div>

    <!-- Scroll down indicator -->
    <a (click)="scrollTo('servicios')"
        class="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-3 group cursor-pointer animate-fade-in-up delay-700"
        aria-label="Desplazar hacia abajo">
        <span
            class="text-[10px] text-lm-silver tracking-[0.3em] uppercase font-body group-hover:text-lm-white transition-colors duration-300">Descubre
            más</span>
        <div
            class="w-10 h-10 border border-lm-graphite/50 rounded-full flex items-center justify-center group-hover:border-lm-silver/60 transition-all duration-300 hero-scroll-bounce">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                class="text-lm-silver group-hover:text-lm-white transition-colors duration-300">
                <path d="m6 9 6 6 6-6" />
            </svg>
        </div>
    </a>

    <!-- Bottom line -->
    <div
        class="absolute bottom-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-lm-graphite to-transparent z-10">
    </div>
</section>
