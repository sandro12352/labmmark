<section id="contacto" class="relative py-24 lg:py-32" aria-labelledby="contact-title">
    <!-- Background accent -->
    <div class="absolute top-0 right-0 w-1/3 h-full bg-lm-charcoal/30 hidden lg:block"></div>

    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10">
        <div class="grid lg:grid-cols-2 gap-16 lg:gap-24">
            <!-- Left: CTA Text -->
            <div class="space-y-8">
                <div class="flex items-center gap-4 mb-2">
                    <div class="w-12 h-[1px] bg-lm-silver"></div>
                    <span class="text-xs text-lm-silver tracking-[0.3em] uppercase font-body">Contacto</span>
                </div>

                <h2 id="contact-title"
                    class="font-display text-4xl sm:text-5xl lg:text-6xl font-800 tracking-[-0.03em] text-lm-white leading-[1.1]">
                    ¿LISTO PARA<br>
                    <span class="text-lm-silver">TRANSFORMAR</span><br>
                    TU MARCA<span class="text-lm-graphite">?</span>
                </h2>

                <p class="text-lm-silver text-lg max-w-md leading-relaxed">
                    Cuéntanos sobre tu proyecto y descubre cómo podemos llevarlo al siguiente nivel. La primera consulta
                    es sin costo.
                </p>

                <!-- Contact info -->
                <div class="space-y-4 pt-4">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 border border-lm-graphite flex items-center justify-center text-lm-silver">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect width="20" height="16" x="2" y="4" rx="2" />
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                            </svg>
                        </div>
                        <span class="text-sm text-lm-light">hola&#64;labmark.agency</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 border border-lm-graphite flex items-center justify-center text-lm-silver">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                            </svg>
                        </div>
                        <span class="text-sm text-lm-light">+51 999 888 777</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 border border-lm-graphite flex items-center justify-center text-lm-silver">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                                <circle cx="12" cy="10" r="3" />
                            </svg>
                        </div>
                        <span class="text-sm text-lm-light">Lima, Perú</span>
                    </div>
                </div>
            </div>

            <!-- Right: Form -->
            <div class="relative">
                <form (ngSubmit)="onSubmit()" class="space-y-6 bg-lm-charcoal border border-lm-graphite/50 p-8 lg:p-10">
                    <div>
                        <label for="contact-name"
                            class="block text-xs text-lm-silver tracking-[0.2em] uppercase mb-3 font-body">Nombre</label>
                        <input id="contact-name" type="text"
                            class="w-full bg-lm-black border border-lm-graphite px-4 py-3 text-sm text-lm-white placeholder-lm-silver/40 focus:border-lm-silver focus:outline-none transition-colors font-body"
                            placeholder="Tu nombre completo" required>
                    </div>

                    <div>
                        <label for="contact-email"
                            class="block text-xs text-lm-silver tracking-[0.2em] uppercase mb-3 font-body">Email</label>
                        <input id="contact-email" type="email"
                            class="w-full bg-lm-black border border-lm-graphite px-4 py-3 text-sm text-lm-white placeholder-lm-silver/40 focus:border-lm-silver focus:outline-none transition-colors font-body"
                            placeholder="tu@email.com" required>
                    </div>

                    <div>
                        <label for="contact-message"
                            class="block text-xs text-lm-silver tracking-[0.2em] uppercase mb-3 font-body">Mensaje</label>
                        <textarea id="contact-message" rows="5"
                            class="w-full bg-lm-black border border-lm-graphite px-4 py-3 text-sm text-lm-white placeholder-lm-silver/40 focus:border-lm-silver focus:outline-none transition-colors resize-none font-body"
                            placeholder="Cuéntanos sobre tu proyecto..." required></textarea>
                    </div>

                    <button type="submit"
                        class="w-full flex items-center justify-center gap-3 px-8 py-4 bg-lm-white text-lm-black font-display font-700 text-sm tracking-[0.1em] hover:bg-lm-accent transition-all duration-300 group">
                        @if (submitted()) {
                        <span>¡MENSAJE ENVIADO!</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                        } @else {
                        <span>ENVIAR MENSAJE</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                            class="transition-transform group-hover:translate-x-1">
                            <path d="M5 12h14" />
                            <path d="m12 5 7 7-7 7" />
                        </svg>
                        }
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
