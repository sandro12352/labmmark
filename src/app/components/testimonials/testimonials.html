<section class="relative py-24 lg:py-32 bg-lm-charcoal overflow-hidden" aria-labelledby="testimonials-title">
    <!-- Background decorative text -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none select-none">
        <span
            class="font-display text-[10rem] lg:text-[20rem] font-800 text-lm-graphite/[0.07] leading-none whitespace-nowrap">"</span>
    </div>

    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10">
        <!-- Section Header -->
        <div class="mb-20 text-center">
            <div class="flex items-center justify-center gap-4 mb-6">
                <div class="w-12 h-[1px] bg-lm-silver"></div>
                <span class="text-xs text-lm-silver tracking-[0.3em] uppercase font-body">Testimonios</span>
                <div class="w-12 h-[1px] bg-lm-silver"></div>
            </div>
            <h2 id="testimonials-title"
                class="font-display text-4xl sm:text-5xl lg:text-6xl font-800 tracking-[-0.03em] text-lm-white leading-[1.1]">
                LO QUE DICEN<br>
                <span class="text-lm-silver">NUESTROS CLIENTES</span><span class="text-lm-graphite">.</span>
            </h2>
        </div>

        <!-- Testimonials Grid -->
        <div class="grid md:grid-cols-3 gap-6">
            @for (testimonial of testimonials; track testimonial.name; let i = $index) {
            <article
                class="group bg-lm-black border border-lm-graphite/50 p-8 lg:p-10 hover:border-lm-silver/30 transition-all duration-500 relative">
                <!-- Quote mark -->
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="text-lm-graphite mb-6">
                    <path
                        d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z" />
                    <path
                        d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z" />
                </svg>

                <!-- Quote -->
                <blockquote class="text-lm-light text-base leading-relaxed mb-8">
                    "{{ testimonial.quote }}"
                </blockquote>

                <!-- Author -->
                <div class="flex items-center gap-4">
                    <!-- Avatar -->
                    <div
                        class="w-12 h-12 bg-lm-graphite flex items-center justify-center text-lm-white font-display font-700 text-sm tracking-wider">
                        {{ testimonial.initials }}
                    </div>
                    <div>
                        <span class="block text-sm font-600 text-lm-white">{{ testimonial.name }}</span>
                        <span class="block text-xs text-lm-silver mt-0.5">{{ testimonial.role }}, {{ testimonial.company
                            }}</span>
                    </div>
                </div>

                <!-- Bottom accent -->
                <div
                    class="absolute bottom-0 left-0 w-0 h-[2px] bg-lm-white group-hover:w-full transition-all duration-700">
                </div>
            </article>
            }
        </div>
    </div>
</section>
